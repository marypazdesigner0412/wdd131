<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Review Form</title>
    <link rel="stylesheet" href="styles/form.css">
    <script src="scripts/form.js" defer></script>
</head>

<body>
    <header>
        <h1>Product Review</h1>
    </header>

    <main>
        <form method="get" action="review.html" id="reviewForm">
            <div class="form-group">
                <label for="productName">Product Name</label>
                <select id="productName" name="productName" required>
                    <option value="" disabled selected>Select a Product ...</option>
                </select>
            </div>

            <fieldset>
                <legend>Overall Rating</legend>
                <div class="rating-container">
                    <label><input type="radio" name="rating" value="1" required> 1</label>
                    <label><input type="radio" name="rating" value="2" required> 2</label>
                    <label><input type="radio" name="rating" value="3" required> 3</label>
                    <label><input type="radio" name="rating" value="4" required> 4</label>
                    <label><input type="radio" name="rating" value="5" required> 5</label>
                </div>
            </fieldset>

            <div class="form-group">
                <label for="installDate">Date of Installation</label>
                <input type="date" id="installDate" name="installDate" required>
            </div>

            <fieldset>
                <legend>Which features did you find useful?</legend>
                <div class="checkbox-group">
                    <label><input type="checkbox" name="features" value="durability"> Durability</label>
                    <label><input type="checkbox" name="features" value="ease"> Ease of Use</label>
                    <label><input type="checkbox" name="features" value="performance"> Performance</label>
                    <label><input type="checkbox" name="features" value="design"> Design</label>
                </div>
            </fieldset>

            <div class="form-group">
                <label for="review">Written Review (Optional)</label>
                <textarea id="review" name="review" rows="5" placeholder="Share your experience..."></textarea>
            </div>

            <div class="form-group">
                <label for="userName">User Name (Optional)</label>
                <input type="text" id="userName" name="userName">
            </div>

            <input type="submit" value="Post Review" class="btn">
        </form>
    </main>

    <footer class="site-footer">
        <div class="container footer-grid">
            <p>©<span id="currentyear"></span> • Luzmary Paz • Venezuela</p>
            <p id="lastModified"></p>
        </div>
    </footer>
</body>

</html>
