<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Review Form</title>
    <meta name="description" content="WDD 131: Dynamic Web Fundamentals | W05 Assignment: Product Review Form">
    <meta name="author" content="Luzmary Paz">
    <link rel="stylesheet" href="styles/form.css">
    <script src="scripts/form.js" defer></script>
</head>

<body>
    <header>
        <h1>Product Review</h1>
    </header>

    <main>
        <form method="get" action="review.html" id="reviewForm">
            <div class="form-group">
                <label for="productName">Product Name</label>
                <select id="productName" name="productName" required>
                    <option value="" disabled selected>Select a Product ...</option>
                </select>
            </div>

            <fieldset>
                <legend>Overall Rating</legend>
                <div class="rating-group">
                    <label for="rating1">
                        <input type="radio" id="rating1" name="rating" value="1" required> 1
                    </label>
                    <label for="rating2">
                        <input type="radio" id="rating2" name="rating" value="2" required> 2
                    </label>
                    <label for="rating3">
                        <input type="radio" id="rating3" name="rating" value="3" required> 3
                    </label>
                    <label for="rating4">
                        <input type="radio" id="rating4" name="rating" value="4" required> 4
                    </label>
                    <label for="rating5">
                        <input type="radio" id="rating5" name="rating" value="5" required> 5
                    </label>
                </div>
            </fieldset>

            <div class="form-group">
                <label for="installDate">Date of Installation</label>
                <input type="date" id="installDate" name="installDate" required>
            </div>

            <fieldset>
                <legend>Which features did you find useful?</legend>
                <div class="checkbox-group">
                    <input type="checkbox" id="feat-durability" name="features" value="durability">
                    <label for="feat-durability">Durability</label>
            
                    <input type="checkbox" id="feat-ease" name="features" value="ease">
                    <label for="feat-ease">Ease of Use</label>
            
                    <input type="checkbox" id="feat-performance" name="features" value="performance">
                    <label for="feat-performance">Performance</label>
            
                    <input type="checkbox" id="feat-design" name="features" value="design">
                    <label for="feat-design">Design</label>
                </div>
            </fieldset>

            <div class="form-group">
                <label for="review">Written Review (Optional)</label>
                <textarea id="review" name="review" rows="5" placeholder="Share your experience..."></textarea>
            </div>

            <div class="form-group">
                <label for="userName">User Name (Optional)</label>
                <input type="text" id="userName" name="userName">
            </div>

            <input type="submit" value="Post Review" class="btn">
        </form>
    </main>

    <footer class="site-footer">
        <div class="container footer-grid">
            <p>©<span id="currentyear"></span> • Luzmary Paz • Venezuela</p>
            <p id="lastModified"></p>
        </div>
    </footer>
</body>

</html>
