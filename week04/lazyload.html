<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lazy Load</title>
    <meta name="author" content="Luzmary Paz" />
    <link rel="stylesheet" href="styles/lazyload.css" />
    <script src="scripts/lazyload.js" defer></script>
</head>

<body>
    <header>
        <h1>Lazy Loading images</h1>
    </header>

    <main>
        <picture><img src="images/david_underland-daffodil-4916584_640.jpg" alt="flower image" loading="lazy" width="400"
                height="600"></picture>
        <picture><img src="images/wwarby-daisy-8476666_640.jpg" alt="flower image" loading="lazy" width="400"
                height="650"></picture>
        <picture><img src="images/susannp4-sternolde-2910368_640.jpg" alt="flower image" loading="lazy" width="400"
                height="700"></picture>
        <picture><img src="images/eignatik17-flowers-7131334_640.jpg" alt="flower image" loading="lazy" width="400"
                height="750"></picture>
        <picture><img src="images/arcaion-poppies-4971583_640.jpg" alt="flower image" loading="lazy" width="400"
                height="800"></picture>
        <picture><img src="images/iira116-flower-5324314_640.jpg" alt="flower image" loading="lazy" width="400"
                height="850"></picture>
    </main>

    <footer>
        <p>&copy; Luzmary Paz</p>
        <p>Last modified: <span id="lastModified"></span></p>
    </footer>
</body>

</html>
