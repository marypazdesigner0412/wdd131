<!DOCTYPE html>
<html lang="en">

<head>

    <title>Review Confirmation - Product Reviews</title>
    <link rel="stylesheet" href="styles/review.css">
    <script src="scripts/review.js" defer></script>

<body>
    <header>
        <h1>Submission Confirmed</h1>

    <main class="confirmation-container">

            <p>Your product review has been successfully submitted and is now being processed.</p>

            </div>

            <div class="action-links">
                <a href="form.html" class="btn">Submit Another Review</a>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <div class="container footer-grid">
            <p>©<span id="currentyear"></span> • Luzmary Paz • Venezuela</p>
            <p id="lastModified"></p>
        </div>
